name: Refresh All-Time Stats

on:
  schedule:
    # Runs twice a week: Monday and Thursday at 6:00 AM UTC
    - cron: '0 6 * * 1'
    - cron: '0 6 * * 4'
  workflow_dispatch:

jobs:
  call-stats-api:
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/stats/all-time
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.SITE_URL }}/api/stats/all-time")
          echo "HTTP status: $response"
          if [ "$response" -ne 200 ]; then
            echo "API call failed with status $response"
            exit 1
          fi
          echo "Stats API called successfully"
